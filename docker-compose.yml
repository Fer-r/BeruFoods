services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
    networks:
      - beru-network
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/backend:rw
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_DRIVER: pdo_mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_SERVER_VERSION: '8.0'
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change_me_in_dotenv}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
      MERCURE_URL: ${MERCURE_URL}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
      TZ: Europe/Madrid
    ports:
      - 9000:9000
    networks:
      - beru-network
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Europe/Madrid
    ports:
      - 3306:3306
    volumes:
      - database_data:/var/lib/mysql
    networks:
      - beru-network
    healthcheck:
        test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s
    command: --default-authentication-plugin=caching_sha2_password
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - beru-network
  nginx:
    build:
      context: docker/nginx
    restart: always
    volumes:
      - ./docker/nginx/logs:/var/log/nginx
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/certs:/etc/nginx/certs
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - beru-network
  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':80' # Exposes on port 80 within the container, will be mapped to 9090 on host
      MERCURE_PUBLISHER_JWT_KEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA12cqznvNigoUuQBnPZID
        7eV/9Cm5lAqAlv/AXwJivcUDIRpryEDjkTH+8+SR5cZPYnNuDNRDHVSFRs+V5pHr
        d4RUiqWKieudisTCOqB8il4aV34RCgkbhoRkkxvE5cXomgBDBaefcInhw4bSuQHX
        UHR+sVJKskXC0busSOwxnlyvCMLE0jQ4/n4xG+YGRaSssvI1PlgJ2YkWK8qKxxLE
        tTxze6oD+L7QiiehbEa5wWAYMPW5a6PeIjm5to2zeBQvd9YbSeUCBfAUoK9JpOVq
        7OSWiOqgcWdTaBsEtrT/3PqmUqbOIWN9nO066LtGksxG5HH58H4tSFTq5tIvFsuD
        9QIDAQAB
        -----END PUBLIC KEY-----
      MERCURE_PUBLISHER_JWT_ALG: RS256
      MERCURE_SUBSCRIBER_JWT_KEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA12cqznvNigoUuQBnPZID
        7eV/9Cm5lAqAlv/AXwJivcUDIRpryEDjkTH+8+SR5cZPYnNuDNRDHVSFRs+V5pHr
        d4RUiqWKieudisTCOqB8il4aV34RCgkbhoRkkxvE5cXomgBDBaefcInhw4bSuQHX
        UHR+sVJKskXC0busSOwxnlyvCMLE0jQ4/n4xG+YGRaSssvI1PlgJ2YkWK8qKxxLE
        tTxze6oD+L7QiiehbEa5wWAYMPW5a6PeIjm5to2zeBQvd9YbSeUCBfAUoK9JpOVq
        7OSWiOqgcWdTaBsEtrT/3PqmUqbOIWN9nO066LtGksxG5HH58H4tSFTq5tIvFsuD
        9QIDAQAB
        -----END PUBLIC KEY-----
      MERCURE_SUBSCRIBER_JWT_ALG: RS256
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${MERCURE_CORS_ALLOWED_ORIGINS}
        anonymous
        subscriptions
        publish_origins *
        use_jwt_cookie mercure_authorization
    # In production, Caddyfile should be configured for HTTPS and use a valid domain.
    # The default dev Caddyfile serves over HTTP on port 80.
    # command: /usr/bin/caddy run --config /etc/caddy/Caddyfile.dev --adapter caddyfile
    ports:
      - "9090:80" # Map host 9090 to container 80 for Mercure
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    networks:
      - beru-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/.well-known/mercure/healthz"] # Adjusted to http and no port
      timeout: 5s
      retries: 5
      start_period: 60s
networks:
  beru-network:
    driver: bridge
    name: beru-network
volumes:
  database_data:
  mercure_data:
  mercure_config:
